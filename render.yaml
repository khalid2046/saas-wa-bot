services:
  - type: web
    name: wa-bot-platform
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter platform build && pnpm --filter api-server build
    startCommand: node artifacts/api-server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wa-bot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CDK_API_BASE
        sync: false
      - key: CDK_API_KEY
        sync: false
      - key: PORT
        value: 3000

databases:
  - name: wa-bot-db
    plan: starter
    region: oregon
    databaseName: wabotplatform
    user: wabotuser
